<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Mr Logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <audio src="shop.mp3" id="audio" autoplay loop></audio>
    <audio src="fahhhhh.mp3" id="erro"></audio>
    <audio src="vitoria.mp3" id="vitoria"></audio>
    <title>Quiz MR</title>
</head>
<body>
    <main>
        <header>
            <img src="Mr Logo.jpg" alt="logo mr">
            <h1>Teste seus conhecimentos!</h1>
        </header>

        <div id="quiz"></div>

        <template>
            <div class="quiz-item">
                <h3>Pergunta</h3>
                <dl>
                    <dt>
                        <input type="radio" name="item" value="0">
                        <span>
                            Resposta
                        </span>
                    </dt>
                </dl>
            </div>
        </template>

        <div id="acertos">
            <strong>Acertos</strong>
            <span>0 de 15</span>
        </div>
        <div id="feedback"></div>
        <div id="fim" class="hidden">
            <h2>Fim do Quiz!</h2>
            <p id="mensagemFinal"></p>
            <strong id="resultadoFinal"></strong>

            <button onclick="refazerQuiz()">Refazer Quiz</button>
        </div>
    </main>

</body>
<script src="script.js"></script>
</html>
